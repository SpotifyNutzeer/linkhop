name: frontend

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/src/linkhop/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main, master]
  release:
    types: [published]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # packageManager in frontend/package.json is not auto-detected because
      # pnpm/action-setup@v4 inspects the repo root, not the frontend subdir.
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Export backend openapi.json
        working-directory: backend
        run: |
          pip install -e .
          python -c "from linkhop.main import app; import json; json.dump(app.openapi(), open('openapi.json','w'))"

      - name: Generate API schema
        run: pnpm gen:api

      - name: Check schema drift
        run: git diff --exit-code src/lib/api/schema.d.ts

      - name: Type check
        run: pnpm check

      - name: Unit + component tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: check
    defaults:
      run:
        working-directory: frontend
    # E2E_TEST_URL lets us swap the happy-path URL if Tidal's public metadata
    # endpoint flakes in CI. Leave unset to keep the smoke spec's default.
    env:
      E2E_BASE_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # No root-level docker-compose.yml exists; `backend/docker-compose.yml`
      # only provides Postgres + Redis, so we bring those up via compose and
      # run the backend itself with uvicorn for fast iteration.
      - name: Start Postgres + Redis
        working-directory: backend
        run: docker compose up -d --wait

      - name: Install backend
        working-directory: backend
        run: pip install -e .

      - name: Initialise backend schema
        working-directory: backend
        env:
          LINKHOP_DATABASE_URL: "postgresql+asyncpg://linkhop:linkhop@127.0.0.1:5432/linkhop"
        run: linkhop-admin init-db

      # Hintergrund-Launches schliessen stdin und disownen, sonst hält bash
      # den Step offen, solange der Kindprozess lebt. wait-on braucht ein
      # explizites -t: der Default ist Infinity, d.h. ein crashender uvicorn
      # würde den Step bis zum 6-h-Job-Limit pollen. 127.0.0.1 statt localhost,
      # weil localhost auf ::1 resolven kann und uvicorn mit --host 127.0.0.1
      # nur IPv4 bedient.
      #
      # LINKHOP_DATABASE_URL / LINKHOP_REDIS_URL: Die pydantic-settings Defaults
      # verwenden "localhost", was auf Ubuntu-Runnern als ::1 auflösen kann.
      # Docker Compose bindet Postgres + Redis nur auf 127.0.0.1, deshalb
      # erzwingen wir hier explizit IPv4.
      - name: Start backend (uvicorn)
        working-directory: backend
        env:
          LINKHOP_DATABASE_URL: "postgresql+asyncpg://linkhop:linkhop@127.0.0.1:5432/linkhop"
          LINKHOP_REDIS_URL: "redis://127.0.0.1:6379/0"
        run: |
          nohup env \
            LINKHOP_DATABASE_URL="$LINKHOP_DATABASE_URL" \
            LINKHOP_REDIS_URL="$LINKHOP_REDIS_URL" \
            uvicorn linkhop.main:app --host 127.0.0.1 --port 8080 \
            > uvicorn.log 2>&1 < /dev/null &
          disown
          # /health prüft sowohl Redis als auch Postgres. /services hatte
          # weder Redis- noch DB-Zugriff, d.h. ein kaputter Redis liess den
          # Check passieren, aber jeder /convert-Request hing dann im
          # Rate-Limiter.
          if ! npx --yes wait-on -t 60000 http-get://127.0.0.1:8080/api/v1/health; then
            echo "::group::uvicorn.log"
            cat uvicorn.log || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Start frontend dev server
        # --host 127.0.0.1 aus demselben Grund wie bei uvicorn: Vite bindet per
        # Default auf "localhost", was auf GitHub-Runnern gern als ::1 auflöst.
        # wait-on unten fragt 127.0.0.1 (IPv4) — ohne expliziten IPv4-Host
        # rennt das in den 60s-Timeout.
        run: |
          nohup pnpm dev --host 127.0.0.1 > vite.log 2>&1 < /dev/null &
          disown

      - name: Wait for frontend
        run: |
          if ! npx --yes wait-on -t 60000 http-get://127.0.0.1:5173; then
            echo "::group::vite.log"
            cat vite.log || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Smoke-test API chain
        run: |
          echo "=== 1. Backend direkt (unsupported URL) ==="
          curl -sf --max-time 10 'http://127.0.0.1:8080/api/v1/convert?url=https://not-a-music-service.example/xyz' || echo "EXIT: $?"

          echo ""
          echo "=== 2. Backend direkt (Deezer) ==="
          curl -sf --max-time 20 'http://127.0.0.1:8080/api/v1/convert?url=https://www.deezer.com/track/3135556' | head -c 500 || echo "EXIT: $?"

          echo ""
          echo "=== 3. Via Vite proxy (unsupported URL) ==="
          curl -sf --max-time 10 'http://127.0.0.1:5173/api/v1/convert?url=https://not-a-music-service.example/xyz' || echo "EXIT: $?"

          echo ""
          echo "=== 4. Via Vite proxy (Deezer) ==="
          curl -sf --max-time 20 'http://127.0.0.1:5173/api/v1/convert?url=https://www.deezer.com/track/3135556' | head -c 500 || echo "EXIT: $?"

          echo ""
          echo "=== 5. Backend health ==="
          curl -sf --max-time 5 'http://127.0.0.1:8080/api/v1/health' || echo "EXIT: $?"

          echo ""
          echo "=== 6. Page HTML (check if SvelteKit renders) ==="
          curl -sf --max-time 5 'http://127.0.0.1:5173/?url=https://www.deezer.com/track/3135556' | grep -oE '<(div|section|a) [^>]*class="[^"]*"' | head -20 || echo "EXIT: $?"

      - name: Run E2E
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/uvicorn.log

      - name: Upload vite log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vite-log
          path: frontend/vite.log

      - name: Show vite log tail
        if: failure()
        run: tail -100 frontend/vite.log || true

  image:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'release'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # Needed to export openapi.json before generating the TS client that
      # ships in the image build context.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export backend openapi.json
        working-directory: backend
        run: |
          pip install -e .
          python -c "from linkhop.main import app; import json; json.dump(app.openapi(), open('openapi.json','w'))"

      - name: Generate schema for image build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm gen:api

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/linkhop-frontend:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository_owner }}/linkhop-frontend:latest
