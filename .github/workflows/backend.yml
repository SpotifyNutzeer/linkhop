name: backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  release:
    types: [published]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linkhop
          POSTGRES_PASSWORD: linkhop
          POSTGRES_DB: linkhop
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U linkhop -d linkhop"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --tb=short -q

  image:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'release'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io verlangt lowercase repo-Paths; github.repository_owner
      # behält die Groß-/Kleinschreibung bei (hier "SpotifyNutzeer").
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/linkhop-backend:${{ github.event.release.tag_name }}
            ghcr.io/${{ env.OWNER_LC }}/linkhop-backend:latest
