apiVersion: v1
kind: Service
metadata:
  name: {{ include "linkhop.fullname" . }}-backend
  labels:
    {{- include "linkhop.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "linkhop.backendSelectorLabels" . | nindent 4 }}
