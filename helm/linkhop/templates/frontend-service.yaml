apiVersion: v1
kind: Service
metadata:
  name: {{ include "linkhop.fullname" . }}-frontend
  labels:
    {{- include "linkhop.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "linkhop.frontendSelectorLabels" . | nindent 4 }}
